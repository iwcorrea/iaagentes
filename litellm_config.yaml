model_list:
  - model_name: local-coder
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b
      api_base: http://localhost:11434
      temperature: 0.0
      max_tokens: 4096
      supports_function_calling: false
      fallbacks_when_rate_limited: true

  - model_name: cloud-coder
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.0
      max_tokens: 4096
      fallbacks:
        - openrouter/google/gemma-4-31b-it:free
        - openrouter/qwen/qwen3-coder:free
        - openrouter/openai/gpt-oss-120b:free
        - openrouter/nousresearch/hermes-3-llama-3.1-405b:free
        - openrouter/meta-llama/llama-3.2-3b-instruct:free
      cooldown_time: 60          # Aumentado a 60s para esquivar rate‑limits
      num_retries: 2             # Reintentar dos veces
      retry_delay: 20            # Esperar 20s entre reintentos
      fallbacks_when_rate_limited: true

  - model_name: hibrido-coder
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b
      api_base: http://localhost:11434
      temperature: 0.0
      max_tokens: 4096
      supports_function_calling: false
      fallbacks:
        - openrouter/nvidia/nemotron-3-super-120b-a12b:free
        - openrouter/google/gemma-4-31b-it:free
      cooldown_time: 30
      num_retries: 2
      retry_delay: 10
      fallbacks_when_rate_limited: true