<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 AI-ECOSYSTEM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .code-block { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; font-family: monospace; white-space: pre-wrap; }
        .markdown-body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <!-- Header -->
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i class="fas fa-brain text-3xl text-blue-400"></i>
            <div>
                <h1 class="text-xl font-bold">AI-ECOSYSTEM</h1>
                <p class="text-xs text-gray-400">Arquitecto Autónomo de Software</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="status-badge" class="px-3 py-1 rounded-full text-xs font-semibold bg-green-600">Conectado</span>
            <button onclick="checkStatus()" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <!-- Tabs -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 flex gap-6">
        <button class="tab-active py-3 text-sm font-medium transition" onclick="switchTab('chat')">
            <i class="fas fa-comments mr-2"></i>Chat
        </button>
        <button class="py-3 text-sm font-medium text-gray-400 hover:text-white transition" onclick="switchTab('projects')">
            <i class="fas fa-folder mr-2"></i>Proyectos
        </button>
        <button class="py-3 text-sm font-medium text-gray-400 hover:text-white transition" onclick="switchTab('improvements')">
            <i class="fas fa-lightbulb mr-2"></i>Mejoras
        </button>
        <button class="py-3 text-sm font-medium text-gray-400 hover:text-white transition" onclick="switchTab('files')">
            <i class="fas fa-file-code mr-2"></i>Archivos
        </button>
    </nav>

    <!-- Tab Content: Chat -->
    <section id="tab-chat" class="p-6 max-w-4xl mx-auto">
        <div class="bg-gray-800 rounded-xl border border-gray-700 p-4 h-96 overflow-y-auto mb-4" id="chat-messages">
            <div class="text-center text-gray-500 mt-20">
                <i class="fas fa-robot text-5xl mb-4"></i>
                <p class="text-lg">Envía un prompt para comenzar a construir</p>
                <p class="text-sm mt-2">Ejemplo: "Crea una aplicación web de lista de tareas con FastAPI y React"</p>
            </div>
        </div>
        <div class="flex gap-3">
            <textarea id="chat-input" rows="3" placeholder="Describe la aplicación que quieres crear..." 
                      class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            <button onclick="sendPrompt()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition self-end">
                <i class="fas fa-paper-plane mr-2"></i>Enviar
            </button>
        </div>
        <div id="loading-indicator" class="hidden mt-4 text-center text-blue-400">
            <i class="fas fa-spinner fa-spin mr-2"></i>Los agentes están trabajando... (puede tardar 2-5 minutos)
        </div>
        <div id="chat-result" class="mt-4"></div>
    </section>

    <!-- Tab Content: Projects -->
    <section id="tab-projects" class="p-6 max-w-4xl mx-auto hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">📁 Proyectos Generados</h2>
            <button onclick="loadProjects()" class="text-blue-400 hover:text-blue-300 transition">
                <i class="fas fa-sync-alt mr-2"></i>Refrescar
            </button>
        </div>
        <div id="projects-list" class="space-y-3"></div>
    </section>

    <!-- Tab Content: Improvements -->
    <section id="tab-improvements" class="p-6 max-w-4xl mx-auto hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">💡 Panel de Mejoras</h2>
            <div class="flex gap-3">
                <select id="improvement-filter" onchange="loadImprovements()" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm">
                    <option value="pending">Pendientes</option>
                    <option value="approved">Aprobadas</option>
                    <option value="applied">Aplicadas</option>
                    <option value="all">Todas</option>
                </select>
                <button onclick="runMetaAgent()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">
                    <i class="fas fa-brain mr-2"></i>Ejecutar MetaAgent
                </button>
            </div>
        </div>
        <div id="improvements-list" class="space-y-3"></div>
    </section>

    <!-- Tab Content: Files -->
    <section id="tab-files" class="p-6 max-w-4xl mx-auto hidden">
        <div class="flex gap-3 mb-4">
            <select id="file-project-select" onchange="loadFiles()" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
                <option value="">Selecciona un proyecto...</option>
            </select>
            <button onclick="loadFiles()" class="text-blue-400 hover:text-blue-300 transition">
                <i class="fas fa-folder-open mr-2"></i>Abrir
            </button>
        </div>
        <div id="files-tree" class="bg-gray-800 rounded-xl border border-gray-700 p-4"></div>
        <div id="file-content" class="mt-4 hidden">
            <h3 class="font-bold mb-2" id="file-name"></h3>
            <div class="code-block" id="file-code"></div>
        </div>
    </section>

    <script>
        const API = 'http://localhost:8000';

        // ──── UTILIDADES ────
        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
            if (tab === 'projects') loadProjects();
            if (tab === 'improvements') loadImprovements();
            if (tab === 'files') loadProjectSelect();
        }

        async function checkStatus() {
            try {
                const res = await fetch(API + '/');
                const data = await res.json();
                document.getElementById('status-badge').className = data.status === 'ok' 
                    ? 'px-3 py-1 rounded-full text-xs font-semibold bg-green-600'
                    : 'px-3 py-1 rounded-full text-xs font-semibold bg-red-600';
                document.getElementById('status-badge').textContent = data.status === 'ok' ? 'Conectado' : 'Desconectado';
            } catch { document.getElementById('status-badge').textContent = 'Sin conexión'; }
        }

        // ──── CHAT ────
        async function sendPrompt() {
            const input = document.getElementById('chat-input');
            const prompt = input.value.trim();
            if (!prompt) return;
            input.value = '';
            document.getElementById('loading-indicator').classList.remove('hidden');
            addMessage('user', prompt);
            try {
                const res = await fetch(API + '/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })
                });
                const data = await res.json();
                const content = data.choices?.[0]?.message?.content || 'Sin respuesta';
                addMessage('assistant', content);
                document.getElementById('chat-result').innerHTML = 
                    '<div class="code-block mt-3">' + content.replace(/\n/g, '<br>') + '</div>';
            } catch (e) {
                addMessage('assistant', '❌ Error de conexión');
            } finally {
                document.getElementById('loading-indicator').classList.add('hidden');
            }
        }

        function addMessage(role, text) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `mb-3 ${role === 'user' ? 'text-right' : 'text-left'}`;
            div.innerHTML = role === 'user'
                ? `<span class="bg-blue-600 text-white px-4 py-2 rounded-lg inline-block">${text}</span>`
                : `<span class="bg-gray-700 text-gray-100 px-4 py-2 rounded-lg inline-block max-w-full overflow-x-auto"><pre class="whitespace-pre-wrap">${text}</pre></span>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ──── PROYECTOS ────
        async function loadProjects() {
            try {
                const res = await fetch(API + '/projects');
                const data = await res.json();
                const list = document.getElementById('projects-list');
                list.innerHTML = data.projects.length
                    ? data.projects.map(id => `
                        <div class="bg-gray-800 rounded-lg border border-gray-700 p-4 flex justify-between items-center">
                            <div>
                                <span class="font-mono text-blue-400">${id}</span>
                                <span class="text-gray-500 text-sm ml-3">📁 projects/${id}</span>
                            </div>
                            <button onclick="selectProject('${id}')" class="text-sm text-blue-400 hover:underline">Ver archivos →</button>
                        </div>`).join('')
                    : '<p class="text-gray-500">No hay proyectos aún. ¡Genera uno desde el Chat!</p>';
            } catch { /* silencioso */ }
        }

        function selectProject(id) {
            document.getElementById('file-project-select').value = id;
            switchTab('files');
            loadFiles();
        }

        // ──── MEJORAS ────
        async function loadImprovements() {
            const status = document.getElementById('improvement-filter')?.value || 'pending';
            try {
                const res = await fetch(API + '/system/improvements?status=' + status);
                const data = await res.json();
                const list = document.getElementById('improvements-list');
                list.innerHTML = data.proposals.length
                    ? data.proposals.map(p => `
                        <div class="bg-gray-800 rounded-lg border border-gray-700 p-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-bold">${p.title}</h4>
                                    <p class="text-sm text-gray-400 mt-1">${p.description}</p>
                                    <span class="text-xs text-gray-500">Archivo: ${p.target_file}</span>
                                </div>
                                <div class="flex gap-2">
                                    ${p.status === 'pending' ? `
                                        <button onclick="applyImprovement('${p.id}')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs transition">Aplicar</button>
                                        <button onclick="rejectImprovement('${p.id}')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs transition">Rechazar</button>
                                    ` : `<span class="text-xs px-3 py-1 rounded bg-gray-700 text-gray-400">${p.status}</span>`}
                                </div>
                            </div>
                        </div>`).join('')
                    : '<p class="text-gray-500">No hay propuestas con estado "' + status + '".</p>';
            } catch { /* silencioso */ }
        }

        async function applyImprovement(id) {
            try {
                await fetch(API + '/system/apply-improvement/' + id, { method: 'POST' });
                loadImprovements();
            } catch { alert('Error al aplicar mejora'); }
        }

        async function rejectImprovement(id) {
            try {
                await fetch(API + '/system/reject-improvement/' + id, { method: 'POST' });
                loadImprovements();
            } catch { alert('Error al rechazar mejora'); }
        }

        async function runMetaAgent() {
            try {
                const res = await fetch(API + '/projects');
                const data = await res.json();
                if (!data.projects.length) return alert('No hay proyectos para analizar');
                const lastId = data.projects[data.projects.length - 1];
                await fetch(API + '/system/run-meta-agent?project_id=' + lastId, { method: 'POST' });
                loadImprovements();
            } catch { alert('Error ejecutando MetaAgent'); }
        }

        // ──── ARCHIVOS ────
        async function loadProjectSelect() {
            try {
                const res = await fetch(API + '/projects');
                const data = await res.json();
                const select = document.getElementById('file-project-select');
                select.innerHTML = '<option value="">Selecciona un proyecto...</option>' +
                    data.projects.map(id => `<option value="${id}">${id}</option>`).join('');
            } catch { /* silencioso */ }
        }

        async function loadFiles() {
            const projectId = document.getElementById('file-project-select').value;
            if (!projectId) return;
            try {
                const res = await fetch(API + '/projects/' + projectId + '/files');
                const data = await res.json();
                const tree = document.getElementById('files-tree');
                tree.innerHTML = data.files.length
                    ? data.files.map(f => `
                        <div class="flex items-center gap-2 py-1 hover:bg-gray-700 rounded px-2 cursor-pointer" onclick="viewFile('${projectId}', '${f}')">
                            <i class="fas fa-file-code text-blue-400"></i>
                            <span class="font-mono text-sm">${f}</span>
                        </div>`).join('')
                    : '<p class="text-gray-500">Sin archivos (o esperando generación)</p>';
            } catch { /* silencioso */ }
        }

        async function viewFile(projectId, filename) {
            try {
                const res = await fetch(API + '/projects/' + projectId + '/file?path=' + encodeURIComponent(filename));
                const data = await res.json();
                document.getElementById('file-content').classList.remove('hidden');
                document.getElementById('file-name').textContent = filename;
                document.getElementById('file-code').textContent = data.content;
            } catch { /* silencioso */ }
        }

        // ──── INICIO ────
        checkStatus();
    </script>
</body>
</html>
